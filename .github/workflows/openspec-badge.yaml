name: OpenSpec Badge

on:
  push:
    branches: [main]

jobs:
  badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2
      - uses: weAretechnative/openspec-badge-action@0ee70666841d4c08d3ec8a95b5546b91abc6125c  # main
        with:
          metric_types: number_of_specs,number_of_requirements,tasks_status,open_changes

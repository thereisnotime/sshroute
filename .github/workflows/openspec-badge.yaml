name: OpenSpec Badge

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: weAretechnative/openspec-badge-action@0ee70666841d4c08d3ec8a95b5546b91abc6125c  # main
        with:
          metric_types: number_of_specs,number_of_requirements,tasks_status,open_changes

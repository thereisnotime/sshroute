version: 2
project_name: sshroute
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows, android]
    goarch: [amd64, arm64]
    ignore:
      - goos: android
        goarch: amd64
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/thereisnotime/sshroute/internal/version.Version={{.Version}}
      - -X github.com/thereisnotime/sshroute/internal/version.Commit={{.Commit}}
      - -X github.com/thereisnotime/sshroute/internal/version.Date={{.Date}}
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --bundle=${artifact}.bundle
      - ${artifact}
      - --yes
    signature: ${artifact}.bundle
    artifacts: checksum

sboms:
  - artifacts: archive

changelog:
  use: github
  format: "{{.SHA}}: {{.Message}} (@{{.AuthorUsername}})"
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^ci:']

release:
  # release-please creates the GitHub release first, then this job uploads the
  # artifacts to it. keep-existing avoids clobbering that release (and still
  # creates one on a manually pushed tag, where none exists yet).
  mode: keep-existing
  footer: |
    **Full changelog**: See [CHANGELOG.md](https://github.com/thereisnotime/sshroute/blob/main/CHANGELOG.md)

version: 2
project_name: sshroute
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/thereisnotime/sshroute/internal/version.Version={{.Version}}
      - -X github.com/thereisnotime/sshroute/internal/version.Commit={{.Commit}}
      - -X github.com/thereisnotime/sshroute/internal/version.Date={{.Date}}
archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: "checksums.txt"
changelog:
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^ci:']
